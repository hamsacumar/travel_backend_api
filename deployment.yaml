apiVersion: apps/v1
kind: Deployment
metadata:
  name: transitx-api-dev
  namespace: transitx-dev
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  selector:
    matchLabels:
      app: transitx-dev-backend
  template:
    metadata:
      labels:
        app: transitx-dev-backend
    spec:
      containers:
        # =========================
        # MAIN GO APPLICATION
        # =========================
        - name: transitx-dev
          image: asia-south1-docker.pkg.dev/__PROJECT_ID__/transitx-repo/app:__IMAGE_TAG__
          ports:
            - containerPort: 8080
          env:
            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  name: transitx-secrets
                  key: DB_HOST
            - name: DB_PORT
              valueFrom:
                secretKeyRef:
                  name: transitx-secrets
                  key: DB_PORT
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: transitx-secrets
                  key: DB_USER
            - name: DB_PASS
              valueFrom:
                secretKeyRef:
                  name: transitx-secrets
                  key: DB_PASS
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: transitx-secrets
                  key: DB_NAME
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: transitx-secrets
                  key: JWT_SECRET
            - name: TEXTLK_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: transitx-secrets
                  key: TEXTLK_API_TOKEN
            - name: EXTLK_SENDER_ID
              valueFrom:
                secretKeyRef:
                  name: transitx-secrets
                  key: EXTLK_SENDER_ID
            - name: ADMIN_PHONE
              valueFrom:
                secretKeyRef:
                  name: transitx-secrets
                  key: ADMIN_PHONE
            - name: PORT
              value: "8080"
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"

          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10

          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5

          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
          volumeMounts:
            - name: cloudsql
              mountPath: /cloudsql
        # =========================
        # CLOUD SQL PROXY SIDECAR
        # =========================
        - name: cloud-sql-proxy
          image: gcr.io/cloud-sql-connectors/cloud-sql-proxy:2.11.4
          args:
            - "transitx-dev:asia-south1:transitx-dev-db"
            - "--unix-socket=/cloudsql"
          securityContext:
            runAsNonRoot: true
          volumeMounts:
            - name: cloudsql
              mountPath: /cloudsql
      volumes:
        - name: cloudsql
          emptyDir: {}
