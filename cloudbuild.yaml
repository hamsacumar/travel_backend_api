substitutions:
  _NAME: transitx-cluster
  _ZONE: asia-south1-a
  _REGION: asia-south1
  _REPO: transitx-repo
  _IMAGE: app
  _TAG: 0.0.5
  _PROJECT_ID: transitx-dev

options:
  logging: CLOUD_LOGGING_ONLY

steps:
  # 1️⃣ Build Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      [
        'build',
        '-t',
        '${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_REPO}/${_IMAGE}:${_TAG}',
        '.'
      ]

  # 2️⃣ Push image to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      [
        'push',
        '${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_REPO}/${_IMAGE}:${_TAG}'
      ]

  # 3️⃣ Authenticate kubectl to GKE
  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      [
        'container',
        'clusters',
        'get-credentials',
        '${_NAME}',
        '--zone=${_ZONE}',
        '--project=${_PROJECT_ID}'
      ]

  # 4️⃣ Ensure namespace exists
  - name: 'gcr.io/cloud-builders/kubectl'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        kubectl get namespace transitx-dev || kubectl create namespace transitx-dev
    env:
      - 'CLOUDSDK_COMPUTE_ZONE=${_ZONE}'
      - 'CLOUDSDK_CONTAINER_CLUSTER=${_NAME}'

  # 5️⃣ Create or update Kubernetes Secret for environment variables
  - name: 'gcr.io/cloud-builders/kubectl'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        kubectl create secret generic transitx-secrets \
          --namespace=transitx-dev \
          --from-literal=DB_HOST=10.160.0.6 \
          --from-literal=DB_PORT=5432 \
          --from-literal=DB_USER=transitx_dev_user \
          --from-literal=DB_PASS=transitx123 \
          --from-literal=DB_NAME=transitx_dev \
          --from-literal=JWT_SECRET=KumarLOKANiroji \
          --from-literal=TEXTLK_API_TOKEN='4040|Bg3HOXmvtXdV5FOjZqv1XWmY5XQpl7mYOSqeqsyN8cdca8ab' \
          --from-literal=EXTLK_SENDER_ID=TRANSITX \
          --from-literal=ADMIN_PHONE=0761872728 \
          --dry-run=client -o yaml | kubectl apply -f -
    env:
      - 'CLOUDSDK_COMPUTE_ZONE=${_ZONE}'
      - 'CLOUDSDK_CONTAINER_CLUSTER=${_NAME}'

  # 6️⃣ Substitute image tag and project ID in deployment manifest
  - name: 'gcr.io/cloud-builders/gcloud'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        sed "s|__PROJECT_ID__|${_PROJECT_ID}|g; s|__IMAGE_TAG__|${_TAG}|g" deployment.yaml > k8s.yaml

  # 7️⃣ Deploy to GKE
  - name: 'gcr.io/cloud-builders/kubectl'
    args:
      [
        'apply',
        '-f',
        'k8s.yaml'
      ]
    env:
      - 'CLOUDSDK_COMPUTE_ZONE=${_ZONE}'
      - 'CLOUDSDK_CONTAINER_CLUSTER=${_NAME}'

images:
  - '${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_REPO}/${_IMAGE}:${_TAG}'
