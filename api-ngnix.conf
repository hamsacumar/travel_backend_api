server {
    listen 443 ssl;
    server_name api-passenger.dev-mytaxi.com;

    # SSL certificate (replace with your certs)
    ssl_certificate     /etc/ssl/certs/your-cert.crt;   #env file
    ssl_certificate_key /etc/ssl/private/your-key.key;

    location / {
        # Forward all requests to your backend
        proxy_pass http://127.0.0.1:8080;  # Replace with your backend server IP:port or service name

        # Add CORS headers for browser frontend
        add_header 'Access-Control-Allow-Origin' 'https://portal.dev-mytaxi.com';
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS';
        add_header 'Access-Control-Allow-Headers' 'Authorization,Content-Type,X-Correlation-Id';

        # Handle OPTIONS preflight requests
        if ($request_method = OPTIONS) {
            add_header 'Access-Control-Allow-Origin' 'https://portal.dev-mytaxi.com';
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS';
            add_header 'Access-Control-Allow-Headers' 'Authorization,Content-Type,X-Correlation-Id';
            return 204;
        }

        # Optional: preserve client headers when forwarding
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}